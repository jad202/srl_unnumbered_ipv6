name: SRL_DC_IPV6
prefix: ""
topology:
  kinds:
    srl:
      image: ghcr.io/nokia/srlinux:25.7.2
      type: ixr-d3l
    linux:
      type: linux
      image: ghcr.io/hellt/network-multitool
  nodes:
    s1:
      kind: srl
    s2:
      kind: srl
    l1:
      kind: srl
    l2:
      kind: srl
    l3:
      kind: srl
    l4:
      kind: srl
    h1-100:
     kind: linux
     exec:
       - ip link set dev eth1 address 00:00:00:01:00:01
       - ip link add link eth1 name eth1.100 type vlan id 100
       - ip link set dev eth1.100 address 00:00:00:01:00:01
       - ip addr add 192.168.100.1/24 dev eth1.100
       - ip link set dev eth1.100 up
    h1-101:
     kind: linux
     exec:
       - ip link set dev eth1 address 00:00:00:01:01:02
       - ip link add link eth1 name eth1.100 type vlan id 100
       - ip link set dev eth1.100 address 00:00:00:01:01:02
       - ip addr add 192.168.100.2/24 dev eth1.100
       - ip link set dev eth1.100 up
    h12:
     kind: linux
    h2:
     kind: linux
    h102:
     kind: linux
     exec: 
       - ip link add link eth1 name eth1.200 type vlan id 200
       - ip link set add 00:00:00:02:00:01 dev eth1.200
       - ip addr add 192.168.200.1/24 dev eth1.200
       - ip link set up dev eth1.200
       - ip route add 192.168.201.0/24 via 192.168.200.1 dev eth1.200
    h202:
     kind: linux
     exec: 
       - ip link add link eth1 name eth1.201 type vlan id 200
       - ip link set add 00:00:00:02:01:02 dev eth1.201
       - ip addr add 192.168.201.2/24 dev eth1.200
       - ip link set up dev eth1.201
       - ip route add 192.168.200.0/24 via 192.168.201.2 dev eth1.201
    h302:
     kind: linux
    h402:
     kind: linux

  links:
  - endpoints: ["s1:e1-1", "l1:e1-1"]
  - endpoints: ["s1:e1-2", "l2:e1-1"]

  - endpoints: ["s2:e1-1", "l1:e1-2"]
  - endpoints: ["s2:e1-2", "l2:e1-2"]


  - endpoints: ["s1:e1-3", "l3:e1-1"]
  - endpoints: ["s2:e1-3", "l3:e1-2"]


  - endpoints: ["s1:e1-4", "l4:e1-1"]
  - endpoints: ["s2:e1-4", "l4:e1-2"]

  - endpoints: ["l1:e1-5", "h1-100:eth1"]
  - endpoints: ["l2:e1-5", "h1-101:eth1"]

  - endpoints: ["l1:e1-10", "h12:eth1"]
  - endpoints: ["l2:e1-10", "h12:eth2"]
  - endpoints: ["l3:e1-10", "h2:eth1"]
    
  - endpoints: ["l1:e1-11", "h102:eth1"]
  - endpoints: ["l2:e1-11", "h202:eth1"]
  - endpoints: ["l3:e1-11", "h302:eth1"]
  - endpoints: ["l4:e1-11", "h402:eth1"]
